<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Development Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --card: rgba(0, 0, 0, 0.65);
      --border: rgba(255,255,255,0.08);
      --text-secondary: rgba(255,255,255,0.5);
      --amethyst: #5a0096;
      --helium-1: #ff7300;
      --helium-2: #e65100;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #particles-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      border-radius: 26px;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.4px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      padding: 15px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .amethyst {
      background: var(--amethyst);
      box-shadow: 0 6px 18px rgba(90, 0, 150, 0.35);
    }

    .helium {
      background: linear-gradient(45deg, var(--helium-1), var(--helium-2));
      box-shadow: 0 6px 18px rgba(255, 115, 0, 0.35);
    }

    .footer {
      margin-top: 26px;
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.8px;
    }
  </style>
</head>

<body>
<canvas id="particles-canvas"></canvas>

<div class="card">
  <div class="title">Selecciona un proyecto</div>

  <div class="buttons">
    <a href="index.html" class="btn amethyst">Amethyst Development</a>
    <a href="helium.html" class="btn helium">Helium Development</a>
  </div>

  <div class="footer">Â© 2026 ItsDarexMC</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');

  let w, h, particles;

  const config = {
    colors: ['#8a2be2', '#ff8c00'],
    connectDist: 140,
    maxVelocity: 0.18
  };

  function getParticleCount() {
    return Math.floor((window.innerWidth * window.innerHeight) / 7000);
  }

  function resizeCanvas() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    initParticles();
  }

  function initParticles() {
    particles = [];
    const count = getParticleCount();

    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * config.maxVelocity,
        vy: (Math.random() - 0.5) * config.maxVelocity,
        radius: window.innerWidth < 768 ? 1.3 : 1.8,
        color: config.colors[Math.floor(Math.random() * config.colors.length)]
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < particles.length; i++) {
      const p1 = particles[i];

      p1.x += p1.vx;
      p1.y += p1.vy;

      if (p1.x < 0 || p1.x > w) p1.vx *= -1;
      if (p1.y < 0 || p1.y > h) p1.vy *= -1;

      ctx.fillStyle = p1.color;
      ctx.beginPath();
      ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2);
      ctx.fill();

      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];

        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < config.connectDist) {
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = p1.color;
          ctx.globalAlpha = 1 - dist / config.connectDist;
          ctx.lineWidth = 0.5;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resizeCanvas);

  resizeCanvas();
  draw();
})();
</script>

</body>
</html>
