<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Development</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
          margin: 0;
          min-height: 100vh;
          font-family: 'Poppins', sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          color: white;
          padding: 20px;
          box-sizing: border-box;

          background: linear-gradient(
            to bottom,
            #000000 0%,
            #05000a 30%,
            #120021 60%,
            #2e004d 100%
          );
        }

        .card {
          width: 100%;
          max-width: 520px;
          padding: 25px;
          border-radius: 30px;
          background: rgba(255,255,255,0.04);
          backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          border: 1px solid rgba(255,255,255,0.08);
          display: flex;
          flex-direction: column;
          align-items: center;
          box-sizing: border-box;
        }

        .title {
          font-size: 36px;
          font-weight: 700;
          text-align: center;
          text-shadow:
            0 0 5px rgba(255,255,255,0.6),
            0 0 10px rgba(255,255,255,0.4);
        }

        .subtitle {
          font-size: 14px;
          opacity: 0.9;
          margin: 15px 0 25px 0;
          text-align: center;
          max-width: 600px;
          line-height: 1.5;
        }

        .buttons {
          display: flex;
          flex-direction: column;
          gap: 12px;
          width: 100%;
        }

        .btn {
          width: 100%;
          padding: 12px;
          border-radius: 14px;
          border: none;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          transition: 0.2s;
          color: white;
          text-decoration: none;
        }

        .download {
          background: #3c0066;
        }

        .download:hover {
          box-shadow: 0 0 12px #3c0066;
        }

        .buy {
          background: linear-gradient(45deg, #ffb300, #ff7300);
        }

        .buy:hover {
          box-shadow: 0 0 12px #ff9800;
        }

        .discord {
          background: #5865F2;
        }

        .discord:hover {
          box-shadow: 0 0 12px #5865F2;
        }

        .icons {
          display: flex;
          justify-content: center;
          gap: 18px;
          width: 100%;
          margin-top: 20px;
          flex-wrap: wrap;
        }

        .icons a {
          width: 44px;
          height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255,255,255,0.03);
          border-radius: 12px;
          border: 1px solid rgba(255,255,255,0.08);
        }

        .icons img {
          width: 20px;
          filter: brightness(0) invert(1)
                  drop-shadow(0 0 6px #ffffff)
                  drop-shadow(0 0 10px rgba(255,255,255,0.6));
        }

        .icons a:hover {
          transform: scale(1.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.5;
            letter-spacing: 0.5px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .title { font-size: 28px; }
            .card { padding: 20px; }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="title">Amethyst Development</div>

    <div class="subtitle">
        Addon para Meteor Client 1.21.11 enfocado en anarquía, legit y utilidades. 100% código abierto.
    </div>

    <div class="buttons">

        <a href="https://discord.gg/tP2B9zS6pQ" target="_blank" style="text-decoration: none;">
            <button class="btn discord">Unirse al Discord Oficial</button>
        </a>

        <a href="https://work.ink/2m5S/amethystClient" target="_blank" style="text-decoration: none;">
            <button class="btn download">Descargar Addon</button>
        </a>

        <a href="amethystclient/" style="text-decoration: none;">
            <button class="btn buy">Adquirir Cliente (10 €)</button>
        </a>

    </div>

    <div class="icons">
        <a href="https://github.com/ItsDarexMC" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg"></a>
        <a href="https://www.youtube.com/@ItsDarexMC" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/youtube.svg"></a>
        <a href="https://www.instagram.com/ItsDarexMC" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg"></a>
        <a href="https://www.tiktok.com/@ItsDarexMC" target="_blank"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/tiktok.svg"></a>
    </div>

</div>

<div class="footer">
    © 2026 Amethyst Development. All rights reserved.
</div>

</body>
</html>
