<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ametium Development</title>
    <link rel="icon" type="image/png" href="/ametiumlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        html, body {
          height: 100%;
          margin: 0;
          overflow: hidden;
          background: #000000;
        }

        body {
          font-family: 'Poppins', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          text-align: center;
          position: relative;
        }

        #particles-canvas {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0;
        }

        .box {
          opacity: 0;
          transform: translateY(20px);
          animation: fadeIn 0.7s ease forwards;
          width: 100%;
          max-width: 500px;
          padding: 35px;
          border-radius: 30px;
          background: rgba(255,255,255,0.04);
          backdrop-filter: blur(25px);
          border: 1px solid rgba(255,255,255,0.08);
          display: flex;
          flex-direction: column;
          align-items: center;
          box-sizing: border-box;
          position: relative;
          z-index: 1;
        }

        @keyframes fadeIn {
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .title {
          font-size: 28px;
          font-weight: 700;
          margin-bottom: 0px;
          text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .subtitle {
          opacity: 0.8;
          margin-bottom: 15px;
        }

        .suggest {
          font-size: 13px;
          opacity: 0.6;
          margin-bottom: 5px;
        }

       .buttons {
          margin-top: 20px;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 12px;
          width: 100%;
        }

        .buttons a {
          width: 100%;
          text-decoration: none;
        }

        .btn {
          width: 100%;
          padding: 14px;
          border-radius: 14px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          color: white;
          display: block;
          text-align: center;
          box-sizing: border-box;
          transition: 0.25s;
        }

        .discord {
          background: #5865F2;
        }

        .discord:hover {
          background: #4752c4;
          box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
          transform: translateY(-2px);
        }

        .back {
          background: rgba(255,255,255,0.05);
          border: 1px solid rgba(255,255,255,0.1);
        }

        .back:hover {
          background: rgba(255,255,255,0.1);
          transform: translateY(-2px);
        }

        .footer {
          margin-top: 25px;
          font-size: 11px;
          opacity: 0.5;
        }

    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="box">
    <div class="title">Aún no hay Ametium Client</div>
    <div class="subtitle">Próximamente disponible.</div>
    <div class="suggest">Quizás te interese unirte al Discord oficial:</div>

    <div class="buttons">
        <a href="https://discord.gg/tP2B9zS6pQ" target="_blank" class="btn discord">
            Unirse al Discord Oficial
        </a>

        <a href="../" class="btn back">
            Volver al inicio
        </a>
    </div>

    <div class="footer">© 2026 Ametium Development. All rights reserved.</div>
</div>

<script>
    (function() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles;

      function getParticleCount() {
        return Math.floor((window.innerWidth * window.innerHeight) / 7000);
      }

      const config = { color: '#8a2be2', connectDist: 150, maxVelocity: 0.2 };

      function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        initParticles();
      }

      function initParticles() {
        particles = [];
        for (let i = 0; i < getParticleCount(); i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * config.maxVelocity,
            vy: (Math.random() - 0.5) * config.maxVelocity,
            radius: 2
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < particles.length; i++) {
          let p1 = particles[i];
          p1.x += p1.vx;
          p1.y += p1.vy;

          if (p1.x < 0 || p1.x > w) p1.vx *= -1;
          if (p1.y < 0 || p1.y > h) p1.vy *= -1;

          ctx.fillStyle = config.color;
          ctx.beginPath();
          ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2);
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let dx = p1.x - p2.x;
            let dy = p1.y - p2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < config.connectDist) {
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = config.color;
              ctx.lineWidth = 0.6;
              ctx.globalAlpha = 1 - (dist / config.connectDist);
              ctx.stroke();
              ctx.globalAlpha = 1;
            }
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      draw();
    })();
</script>

</body>
</html>
