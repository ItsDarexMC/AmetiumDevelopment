            margin-top: 4px;
            margin-bottom: 20px;
 }
      .discord-stats-bar {
           display: flex;
           justify-content: center;
           align-items: center;
           gap: 15px;
           width: auto;
           background: rgba(255, 255, 255, 0.05);

           border-radius: 20px;

       }

        .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .btn {

        .icons { display: flex; justify-content: center; gap: 18px; width: 100%; margin-top: 25px; flex-wrap: wrap; }
        .icons a { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .icons img { width: 20px; filter: brightness(0) invert(1) drop-shadow(0 0 6px #ffffff); }
        .icons a:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }

        .footer { margin-top: 30px; font-size: 12px; opacity: 0.5; letter-spacing: 0.5px; text-align: center; position: relative; z-index: 1; }

<script>

    (function() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles;
      function getParticleCount() {
        const area = window.innerWidth * window.innerHeight;
        return Math.floor(area / 7500);
      }
      const config = { color: '#ff7300', connectDist: 150, maxVelocity: 0.2 };
      function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        initParticles();
      }
      function initParticles() {
        particles = [];
        const count = getParticleCount();
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * config.maxVelocity,
            vy: (Math.random() - 0.5) * config.maxVelocity,
            radius: window.innerWidth < 768 ? 1.5 : 2
          });
        }
      }
      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < particles.length; i++) {
          let p1 = particles[i];
          p1.x += p1.vx; p1.y += p1.vy;
          if (p1.x < 0 || p1.x > w) p1.vx *= -1;
          if (p1.y < 0 || p1.y > h) p1.vy *= -1;
          ctx.fillStyle = config.color;
          ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2); ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let dx = p1.x - p2.x; let dy = p1.y - p2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < config.connectDist) {
              ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = config.color;
              ctx.lineWidth = window.innerWidth < 768 ? 0.5 : 0.7;
              ctx.globalAlpha = 1 - (dist / config.connectDist);
              ctx.stroke(); ctx.globalAlpha = 1;
            }
          }
        }
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas(); draw();
    })();

    // Discord Stats API
    (function() {
        const inviteCode = 'BMWbAHC28p';
        async function updateStats() {
            try {
                const response = await fetch(`https://discord.com/api/v9/invites/${inviteCode}?with_counts=true`);
                const data = await response.json();
                if (data.approximate_presence_count !== undefined) {
                    document.getElementById('discord-online').innerText = data.approximate_presence_count;
                }
                if (data.approximate_member_count !== undefined) {
                    document.getElementById('discord-total').innerText = data.approximate_member_count;
                }
            } catch (e) {
                console.log("Error de conexión");
            }
        }
        updateStats();
        setInterval(updateStats, 60000);
    })();
</script>
