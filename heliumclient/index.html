<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helium Development</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
          margin: 0;
          font-family: 'Poppins', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          color: white;
          text-align: center;

          /* Fondo: Negro extendido bajando a naranja #ff6200 */
          background: linear-gradient(
            to bottom,
            #000000 0%,
            #000000 30%,
            #4d1d00 70%,
            #ff6200 100%
          );
          background-attachment: fixed;
        }

        .box {
          padding: 40px;
          border-radius: 20px;
          background: rgba(255, 255, 255, 0.05);
          /* Bordes y sombras con el naranja #ff6200 */
          border: 1px solid rgba(255, 98, 0, 0.5);
          box-shadow: 0 0 20px rgba(255, 98, 0, 0.3);
          backdrop-filter: blur(10px);
        }

        .title {
          font-size: 28px;
          font-weight: 700;
          margin-bottom: 10px;
          /* Brillo blanco intenso estilo Amethyst */
          text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .subtitle {
          opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="title">Aún no hay Helium Client</div>
    <div class="subtitle">Próximamente disponible.</div>
</div>

</body>
</html>
