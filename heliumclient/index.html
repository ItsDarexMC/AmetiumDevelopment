<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helium Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        html, body {
          height: 100%;
          margin: 0;
          overflow: hidden;
          background: #000000;
        }

        body {
          font-family: 'Poppins', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          text-align: center;
          position: relative;
        }

        #particles-canvas {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0;
        }

        .box {
          padding: 40px;
          border-radius: 20px;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 98, 0, 0.5);
          box-shadow: 0 0 20px rgba(255, 98, 0, 0.3);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          position: relative;
          z-index: 1;
        }

        .title {
          font-size: 28px;
          font-weight: 700;
          margin-bottom: 10px;
          text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .subtitle {
          opacity: 0.8;
          margin-bottom: 25px;
        }

        .suggest {
          font-size: 13px;
          opacity: 0.6;
          margin-bottom: 15px;
        }

        .btn-discord {
          display: inline-block;
          background: #5865F2;
          color: white;
          text-decoration: none;
          padding: 12px 25px;
          border-radius: 12px;
          font-weight: 500;
          font-size: 14px;
          transition: 0.3s;
          border: none;
          cursor: pointer;
        }

        .btn-discord:hover {
          background: #4752c4;
          box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
          transform: translateY(-2px);
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="box">
    <div class="title">Aún no hay Helium Client</div>
    <div class="subtitle">Próximamente disponible.</div>
    <div class="suggest">Quizás te interese unirte al Discord oficial:</div>
    <a href="https://discord.gg/BMWbAHC28p" target="_blank" class="btn-discord">
        Unirse al Discord Oficial
    </a>
</div>

<script>
    (function() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles;

      function getParticleCount() {
        const area = window.innerWidth * window.innerHeight;
        return Math.floor(area / 10000);
      }

      const config = {
        color: '#ff7300',
        connectDist: 100,
        maxVelocity: 0.2
      };

      function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        initParticles();
      }

      function initParticles() {
        particles = [];
        const count = getParticleCount();
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * config.maxVelocity,
            vy: (Math.random() - 0.5) * config.maxVelocity,
            radius: window.innerWidth < 768 ? 1 : 1.8
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < particles.length; i++) {
          let p1 = particles[i];
          p1.x += p1.vx; p1.y += p1.vy;
          if (p1.x < 0 || p1.x > w) p1.vx *= -1;
          if (p1.y < 0 || p1.y > h) p1.vy *= -1;
          ctx.fillStyle = config.color;
          ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2); ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let dx = p1.x - p2.x; let dy = p1.y - p2.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < config.connectDist) {
              ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = config.color;
              ctx.lineWidth = window.innerWidth < 768 ? 0.3 : 0.6;
              ctx.globalAlpha = 1 - (dist / config.connectDist);
              ctx.stroke(); ctx.globalAlpha = 1;
            }
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas(); draw();
    })();
</script>

</body>
</html>
