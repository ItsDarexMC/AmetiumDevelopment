<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Development Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
      background: #000000;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #particles-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .card {
      width: 100%;
      max-width: 420px;
      padding: 35px;
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 1;
    }
    .title {
      font-size: 28px;
      margin-bottom: 25px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 1);
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .btn {
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      display: block;
    }
    .btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.2);
    }
    .amethyst { background: #5a0096; box-shadow: 0 4px 15px rgba(90, 0, 150, 0.4); }
    .helium { background: linear-gradient(45deg, #ff7300, #e65100); box-shadow: 0 4px 15px rgba(255, 115, 0, 0.4); }
    .footer { margin-top: 25px; font-size: 12px; opacity: 0.5; letter-spacing: 1px; }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="card">
  <div class="title">Selecciona un proyecto</div>
  <div class="buttons">
    <a href="amethyst.html" class="btn amethyst">Amethyst Development</a>
    <a href="helium.html" class="btn helium">Helium Development</a>
  </div>
  <div class="footer">© 2026 ItsDarexMC. All rights reserved.</div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function getParticleCount() {
      const area = window.innerWidth * window.innerHeight;
      return Math.floor(area / 9000); // Un poco más denso por ser dos colores
    }

    const config = {
      colors: ['#8a2be2', '#ff8c00'],
      connectDist: 100,
      maxVelocity: 0.2
    };

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initParticles();
    }

    function initParticles() {
      particles = [];
      const count = getParticleCount();
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * config.maxVelocity,
          vy: (Math.random() - 0.5) * config.maxVelocity,
          radius: window.innerWidth < 768 ? 1 : 2,
          color: config.colors[Math.floor(Math.random() * config.colors.length)]
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      for (let i = 0; i < particles.length; i++) {
        let p1 = particles[i];
        p1.x += p1.vx; p1.y += p1.vy;
        if (p1.x < 0 || p1.x > w) p1.vx *= -1;
        if (p1.y < 0 || p1.y > h) p1.vy *= -1;
        ctx.fillStyle = p1.color;
        ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2); ctx.fill();
        for (let j = i + 1; j < particles.length; j++) {
          let p2 = particles[j];
          let dx = p1.x - p2.x; let dy = p1.y - p2.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < config.connectDist) {
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = p1.color;
            ctx.lineWidth = window.innerWidth < 768 ? 0.3 : 0.7;
            ctx.globalAlpha = 1 - (dist / config.connectDist);
            ctx.stroke(); ctx.globalAlpha = 1;
          }
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); draw();
  })();
</script>
</body>
</html>
