<script>
/* --- SCRIPT DE PARTÍCULAS (CON CAMBIOS DE COLOR) --- */
(function() {
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let w, h, particles;

function resizeCanvas() {
w = canvas.width = window.innerWidth;
h = canvas.height = window.innerHeight;
initParticles();
}

function initParticles() {
particles = [];
const count = Math.floor((w*h)/7500);
for (let i = 0; i < count; i++) {
particles.push({
x: Math.random()*w,
y: Math.random()*h,
vx:(Math.random()-0.5)*0.2,
vy:(Math.random()-0.5)*0.2
});
}
}

function draw() {
ctx.clearRect(0,0,w,h);
for (let i=0;i<particles.length;i++) {
let p1=particles[i];
p1.x+=p1.vx;
p1.y+=p1.vy;

if(p1.x<0||p1.x>w)p1.vx*=-1;
if(p1.y<0||p1.y>h)p1.vy*=-1;

ctx.beginPath();
ctx.arc(p1.x,p1.y,2,0,Math.PI*2);
/* Cambiado de #ff7300 (naranja) a #ff3b3b (rojo) para los puntos */
ctx.fillStyle="#ff3b3b"; 
ctx.fill();

for(let j=i+1;j<particles.length;j++){
let p2=particles[j];
let dx=p1.x-p2.x;
let dy=p1.y-p2.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<150){
ctx.beginPath();
ctx.moveTo(p1.x,p1.y);
ctx.lineTo(p2.x,p2.y);
/* Cambiado de #ff7300 (naranja) a #ff3b3b (rojo) para las líneas */
ctx.strokeStyle="#ff3b3b"; 
ctx.globalAlpha=1-(dist/150);
ctx.stroke();
ctx.globalAlpha=1;
}
}
}
requestAnimationFrame(draw);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
draw();
})();

/* --- SCRIPT DE DISCORD (SIN CAMBIOS) --- */

if (data.approximate_presence_count !== undefined)
document.getElementById('discord-online').innerText = data.approximate_presence_count;

if (data.approximate_member_count !== undefined)
document.getElementById('discord-total').innerText = data.approximate_member_count;

} catch {}
}

updateStats();
setInterval(updateStats, 60000);
})();
