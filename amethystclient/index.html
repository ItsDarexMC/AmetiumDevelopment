<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Client</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
          margin: 0;
          font-family: 'Poppins', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          color: white;
          text-align: center;

          background: linear-gradient(
            to bottom,
            #000000 0%,
            #0a001a 30%,
            #20003a 70%,
            #5A0096 100%
          );
        }

        .box {
          padding: 40px;
          border-radius: 20px;
          background: rgba(255,255,255,0.05);
          border: 1px solid rgba(90,0,150,0.5);
          box-shadow: 0 0 20px rgba(90,0,150,0.3);
        }

        .title {
          font-size: 28px;
          font-weight: 700;
          margin-bottom: 10px;
        }

        .subtitle {
          opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="box">
    <div class="title">Aún no hay Amethyst Client</div>
    <div class="subtitle">Próximamente disponible.</div>
</div>

</body>
</html>
